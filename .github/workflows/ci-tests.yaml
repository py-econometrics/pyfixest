name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: "Tests Core (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [py310, py314]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: ${{ matrix.environment }}

      - name: Run 'regular' tests
        run: pixi run -e ${{ matrix.environment }} test-default

      - name: Upload coverage to Codecov (partial)
        if: matrix.environment == 'py314'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          partial: true
          flags: core-tests
          files: coverage.xml

  test_slow:
    name: "Tests vs fixest"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [py312-r]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: ${{ matrix.environment }}

      - name: Run tests against r
        run: |
          pixi run -e ${{ matrix.environment }} test-r-core
          pixi run -e ${{ matrix.environment }} test-r-extended
          pixi run -e ${{ matrix.environment }} test-hac

      - name: Upload coverage to Codecov (partial)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          partial: true
          flags: tests-vs-r
          files: coverage.xml

  merge_coverage:
    name: "Merge Coverage"
    runs-on: ubuntu-latest
    needs: [test, test_slow]
    steps:
      - name: Final coverage merge
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          partial: false
          flags: final

  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: docs

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: install tinytex
        run: quarto install tinytex

      - name: Compile docstrings with quartodoc
        run: pixi run -e docs docs-build

      - name: Render docs
        run: pixi run -e docs docs-render

      - name: Save docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_site

  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    needs: ["build-docs", "test"]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: docs/_site
