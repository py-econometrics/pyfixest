name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-python:
    name: "Tests Python (${{ matrix.environment }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        environment: [py310, py314]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: ${{ matrix.environment }}

      - name: Run tests
        run: pixi run -e ${{ matrix.environment }} test-py
        env:
          PYTEST_XDIST_AUTO_NUM_WORKERS: 4

      - name: Upload coverage to Codecov (partial)
        if: matrix.environment == 'py314' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          partial: true
          flags: core-tests
          files: coverage.xml

  test-r:
    name: "Tests vs R (${{ matrix.test-task }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-task: [test-r-core, test-r-extended, test-r-fixest, test-r-hac]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: py312-r

      - name: Run ${{ matrix.test-task }}
        run: pixi run -e py312-r ${{ matrix.test-task }}
        env:
          PYTEST_XDIST_AUTO_NUM_WORKERS: 4

      - name: Upload coverage to Codecov (partial)
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          partial: true
          flags: ${{ matrix.test-task }}
          files: coverage.xml

  merge_coverage:
    name: "Merge Coverage"
    runs-on: ubuntu-latest
    needs: [test-python, test-r]
    steps:
      - name: Final coverage merge
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          partial: false
          flags: final

  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: docs

      - name: Build and render docs
        run: pixi run -e docs docs-render

      - name: Save docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-html
          path: docs/_site

  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    needs: ["build-docs", "test-python"]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-html
          path: docs/_site

      - name: Publish docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_site
