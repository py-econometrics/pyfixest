name: Extended Tests (Optional)

on:
  push:
    branches:
      - master

jobs:
  test:
    name: "Tests Extended (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [py312-r]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          frozen: true
          environments: ${{ matrix.environment }}

      - name: Run long tests with coverage
        run: pixi run -e ${{ matrix.environment }} test-extended

      - name: Upload coverage to Codecov (partial)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: tests-extended
          partial: true
