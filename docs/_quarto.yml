project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "*.ipynb"
    - "*.md"
    - "!quarto_example/"
  post-render:
    - _scripts/generate_llms_md.py

execute:
  freeze: auto
  python: "../.pixi/envs/docs/bin/python3"
  warning: false
  message: false

format:
  html:
    include-in-header:
      - analytics.html

metadata-files:
  - _sidebar.yml

